#   https://docs.google.com/document/d/DOC_ID/pub
# Leave googleDocUrl empty ("") to show the "coming soon" placeholder.
guidelines:
  googleDocUrl: ""

# ── Social feed embeds ─────────────────────────────────────────────────────
# Add embed URLs for Instagram posts, YouTube videos, and LinkedIn posts.
# The home page renders them in a 3-column carousel.
#
# How to get embed URLs:
#   Instagram : https://www.instagram.com/p/{POST_SHORTCODE}/embed/
#               (replace {POST_SHORTCODE} with the code in the post URL)
#   YouTube   : https://www.youtube.com/embed/{VIDEO_ID}
#               (replace {VIDEO_ID} with the 11-char ID from the watch URL)
#   LinkedIn  : https://www.linkedin.com/embed/feed/update/urn:li:share:{SHARE_ID}
#               (get SHARE_ID from the LinkedIn share URL)
#
# Leave embedUrl as "" to show a branded placeholder card instead.
# Add more items to the list — the carousel pages through them in groups of 3.
social:
  heading: "Follow the Event"
  subheading: "Announcements, highlights, and updates from Paradox'26."
  feeds:
    - platform: instagram
      label: "Latest from Instagram"
      embedUrl: ""

    - platform: youtube
      label: "Event Highlight"
      embedUrl: ""

    - platform: linkedin
      label: "LinkedIn Update"
      embedUrl: ""
